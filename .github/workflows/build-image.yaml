name: Build Image
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/litellm

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.1.0

      - uses: docker/setup-buildx-action@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- 1.7.7
          sudo mv actionlint /usr/local/bin/actionlint

      - name: Validate shell scripts
        run: |
          bash -n scripts/image-smoke.sh
          shellcheck scripts/image-smoke.sh

      - name: Validate GitHub Actions
        run: actionlint

      - name: Check uv lockfile
        run: uv lock --check

      - name: Check Dockerfile
        run: docker buildx build --check .

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build candidate image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ env.IMAGE }}:arch-${{ matrix.arch }}-sha-${{ github.sha }}
          push: false
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

      - uses: ./.github/actions/image-smoke
        with:
          image-ref: ${{ env.IMAGE }}:arch-${{ matrix.arch }}-sha-${{ github.sha }}
          artifact-suffix: -${{ matrix.arch }}

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push validated arch image
        if: github.event_name != 'pull_request'
        run: docker push "${{ env.IMAGE }}:arch-${{ matrix.arch }}-sha-${{ github.sha }}"

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="$(docker buildx imagetools inspect "${{ env.IMAGE }}:arch-${{ matrix.arch }}-sha-${{ github.sha }}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.event_name != 'pull_request' && needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done

          digest_args=()
          for digest_file in *; do
            digest_args+=("${{ env.IMAGE }}@sha256:${digest_file}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
