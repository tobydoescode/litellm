name: Image smoke
description: Run the database-backed smoke test against a local LiteLLM image.

inputs:
  image-ref:
    description: Local image reference to test.
    required: false
    default: litellm:smoke
  artifact-suffix:
    description: Suffix for uploaded artifact names.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run image smoke test
      shell: bash
      env:
        LITELLM_SMOKE_IMAGE: ${{ inputs.image-ref }}
      run: |
        set -euo pipefail
        ./scripts/image-smoke.sh 2>&1 | tee image-smoke.txt

    - name: Write smoke summary
      if: always()
      shell: bash
      run: |
        {
          echo "## Image Smoke Test"
          echo ""
          if [[ -s image-smoke.txt ]]; then
            echo '```'
            tail -n 160 image-smoke.txt
            echo '```'
          else
            echo "Image smoke test produced no output."
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload image smoke reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: image-smoke-reports${{ inputs.artifact-suffix }}
        path: image-smoke.txt
        if-no-files-found: warn
