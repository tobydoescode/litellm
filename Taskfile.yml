version: "3"

vars:
  IMAGE: ghcr.io/tobydoescode/litellm
  PLATFORM: linux/arm64

tasks:
  lock:
    desc: Update uv.lock from pyproject.toml
    cmds:
      - uv lock

  build:
    desc: Build LiteLLM image for PLATFORM
    cmds:
      - docker buildx build --platform {{.PLATFORM}} -t {{.IMAGE}} .

  push:
    desc: Build and push LiteLLM image for PLATFORM
    cmds:
      - docker buildx build --platform {{.PLATFORM}} -t {{.IMAGE}} --push .

  build-load:
    desc: Build and load LiteLLM image for PLATFORM locally
    cmds:
      - docker buildx build --platform {{.PLATFORM}} -t {{.IMAGE}} --load .
